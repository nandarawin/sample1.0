<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pro Inventory - Sharp Focus</title>

    

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>


    <style>

        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; --dark: #121212; }

        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; overflow-x: hidden; }

        .page { padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .hidden { display: none !important; }


        button { 

            width: 95%; max-width: 380px; padding: 20px; margin: 10px 0; 

            border-radius: 15px; border: none; font-size: 18px; font-weight: bold; 

            cursor: pointer; -webkit-tap-highlight-color: transparent;

        }

        .btn-main { background: var(--blue); color: white; }

        .btn-capture { 

            background: var(--green); color: white; font-size: 24px; 

            border: 4px solid white; box-shadow: 0 8px 25px rgba(0,0,0,0.5);

            transition: transform 0.1s;

        }

        .btn-capture:active { transform: scale(0.95); }


        #reader-container { 

            position: relative; width: 100%; max-width: 400px; 

            margin: 10px auto; border-radius: 20px; overflow: hidden; border: 3px solid #444;

            background: black;

        }


        #scanner-overlay {

            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);

            width: 90%; height: 40px; border: 2px solid #00ff00;

            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.85); z-index: 5; pointer-events: none;

        }


        #status { margin: 15px; color: #00ff00; font-weight: bold; font-size: 1.3rem; min-height: 35px; }

        #debugCanvas { 

            width: 95%; max-width: 380px; background: white; border-radius: 10px; 

            display: block; margin: 10px auto; border: 2px solid #555; 

            image-rendering: -webkit-optimize-contrast;

        }

    </style>

</head>


<body>


<div id="homePage" class="page">

    <h1 style="margin-top: 40px;">📦 Inventory System</h1>

    <button class="btn-main" onclick="goTo('scanPage', 'add')">➕ Add Stock</button>

    <button class="btn-main" style="background:#333;" onclick="goTo('scanPage', 'take')">➖ Remove Stock</button>

</div>


<div id="scanPage" class="page hidden">

    <div id="status">Starting Camera...</div>


    <div id="reader-container">

        <div id="reader"></div>

        <div id="scanner-overlay"></div>

    </div>


    <button class="btn-capture" onclick="captureAndScan()">📸 CAPTURE & SAVE</button>

    <button class="btn-main" style="background:#cc0000;" onclick="goTo('homePage')">Exit</button>

    

    <p style="font-size: 11px; color: #666;">High-Contrast AI View:</p>

    <canvas id="debugCanvas"></canvas>

</div>


<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzi3CrAiNVWJlLnR0GpUkf5r054s9AGYq3ygw0Xl7xFEFH-hh8SKm5l8hBaMAh5bv_5/exec";


let mode = "";

let html5QrCode = null;

let processing = false;


function goTo(pageId, m = "") {

    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));

    document.getElementById(pageId).classList.remove('hidden');

    if (pageId === 'scanPage') { 

        mode = m; 

        initScanner(); 

    } else { 

        killScanner(); 

    }

}


async function initScanner() {

    html5QrCode = new Html5Qrcode("reader");

    const config = { 

        fps: 25, 

        aspectRatio: 1.0,

        // Requesting the highest possible video quality for better focus

        videoConstraints: { 

            facingMode: "environment",

            width: { ideal: 1920 },

            height: { ideal: 1080 },

            focusMode: "continuous"

        } 

    };

    

    try {

        await html5QrCode.start({ facingMode: "environment" }, config, () => {}, () => {});

        document.getElementById("status").innerText = "Ready to Capture";

    } catch (e) { 

        document.getElementById("status").innerText = "Camera Error";

        alert(e); 

    }

}


function killScanner() {

    if (html5QrCode) {

        html5QrCode.stop().then(() => { html5QrCode = null; }).catch(() => {});

    }

}


async function captureAndScan() {

    if (processing) return;

    const video = document.querySelector("#reader video");

    if (!video) return;


    processing = true;

    if (navigator.vibrate) navigator.vibrate(80);


    const status = document.getElementById("status");

    const canvas = document.getElementById("debugCanvas");

    const ctx = canvas.getContext("2d");


    status.innerText = "⏳ Processing Sharp View...";


    // Use high resolution for processing

    const vW = video.videoWidth;

    const vH = video.videoHeight;


    // Focused crop logic

    const cropW = vW * 0.85;

    const cropH = vH * 0.08; 

    const sx = (vW - cropW) / 2;

    const sy = (vH - cropH) / 2;


    // Giant canvas to keep letters from pixelating

    canvas.width = 2400;

    canvas.height = 240;


    // 5-Filter Consensus for 1 vs I accuracy

    const filters = [

        'grayscale(1) contrast(5) brightness(1.2)',

        'grayscale(1) contrast(7) brightness(1.1)',

        'grayscale(1) contrast(10) brightness(1.0)',

        'grayscale(1) contrast(12) brightness(0.9)',

        'grayscale(1) contrast(15) brightness(1.3)'

    ];


    let allReads = [];


    for (let f of filters) {

        ctx.filter = f;

        // Drawing the high-res frame onto the canvas

        ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, canvas.width, canvas.height);


        const res = await Tesseract.recognize(canvas, 'eng', {

            tessedit_pageseg_mode: 7,

            tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-.'

        });


        let text = res.data.text.replace(/\s/g, "").toUpperCase();

        if (text.length > 3) allReads.push(text);

    }


    function getBestConsensus(reads) {

        if (reads.length === 0) return null;

        let counts = {};

        let maxCount = 0;

        let best = reads[0];

        for (let r of reads) {

            counts[r] = (counts[r] || 0) + 1;

            if (counts[r] > maxCount) {

                maxCount = counts[r];

                best = r;

            }

        }

        return best;

    }


    let pn = getBestConsensus(allReads);


    if (pn) {

        status.innerText = "🎯 MATCH: " + pn;

        const q = prompt(`Quantity for:\n${pn}`, "1");


        if (q && !isNaN(q)) {

            status.innerText = "🚀 Syncing...";

            try {

                await fetch(SCRIPT_URL, {

                    method: "POST",

                    mode: "no-cors",

                    body: JSON.stringify([{

                        pn: pn,

                        qty: parseInt(q),

                        mode: mode,

                        date: new Date().toLocaleString()

                    }])

                });

                status.innerText = "✅ Saved!";

                setTimeout(() => status.innerText = "Ready for Next Scan", 3000);

            } catch (err) {

                status.innerText = "❌ Sync Error";

            }

        }

    } else {

        status.innerText = "❌ Blur Error. Try again.";

    }


    processing = false;

}

</script>


</body>

</html>
